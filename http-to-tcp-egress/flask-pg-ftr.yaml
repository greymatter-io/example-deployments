---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: flask
  labels:
    app: flask
spec:
  replicas: 1
  selector:
    matchLabels:
      app: flask
  template:
    metadata:
      labels:
        app: flask
    spec:
      containers:
        - name: flask
          image: ghcr.io/greymatter-io/example-deployments/pg-flask-app:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 5000
          env:
            - name: DB_HOST
              value: "pgsql"
            - name: DB_PORT
              value: "5432"
            - name: DB_NAME
              value: "pagila"
            - name: DB_USER
              value: "postgres"
            - name: DB_PASSWORD
              value: "yourpassword"
          resources:
            limits:
              cpu: 200m
              memory: 100Mi
            requests:
              cpu: 20m
              memory: 10Mi
---
apiVersion: v1
kind: Service
metadata:
  name: pgsql
spec:
  selector:
    app: postgres
  ports:
    - port: 5432
      targetPort: 5432
