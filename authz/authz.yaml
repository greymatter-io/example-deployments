apiVersion: apps/v1
kind: Deployment
metadata:
  name: authz # Name of the GSL file
  labels:
    app: authz
spec:
  replicas: 1
  selector:
    matchLabels:
      app: authz
  template:
    metadata:
      labels:
        app: authz
    spec:
      containers:
        - name: authz
          image: ghcr.io/greymatter-io/example-deployments/authz:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8080 # Port that authz listens on
          env:
            - name: SERVICE_PORT
              value: "8080"
            - name: RESPONSE_TEXT
              value: "External Authz - Powered By Greymatter"
            - name: HTTP_STATUS
              value: "200"
